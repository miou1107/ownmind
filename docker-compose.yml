services:
  api:
    build: .
    container_name: ownmind-api
    restart: unless-stopped
    ports:
      - "3100:3000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: pgvector/pgvector:pg16
    container_name: ownmind-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ownmind
      POSTGRES_USER: ownmind
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - ownmind_data:/var/lib/postgresql/data
      - ./db/001_init.sql:/docker-entrypoint-initdb.d/001_init.sql
    ports:
      - "5433:5432"

volumes:
  ownmind_data:
